app-id: io.github.arkmanager.ArkManager
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: arkmanager
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=home
  - --filesystem=/tmp
  - --filesystem=/media
  - --filesystem=/mnt
  - --talk-name=org.freedesktop.FileManager1

modules:
  - name: p7zip
    buildsystem: simple
    build-commands:
      - make 7z
      - make install DEST_DIR=/app DEST_BIN=/app/bin DEST_SHARE=/app/lib/p7zip DEST_MAN=/app/share/man
    sources:
      - type: archive
        url: https://github.com/p7zip-project/p7zip/archive/refs/tags/v17.05.tar.gz
        sha256: d2788f892571058c08d27095c22154579dfefb807ebe357571c885f2e1deeb45

  - name: chardet
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --prefix=/app .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/f3/0d/f7b40e940b4fb22e95b98e7cffa05fe45e94e1e7bca8e91ef3f15e6a543c/chardet-5.2.0.tar.gz
        sha256: 1b3b6ff479a8c8857c9091d1fc0145cdef078d0fa3e6e5407d90c0a0e3ebf2b3

  - name: PyQt6
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --prefix=/app PyQt6 PyQt6-Qt6 PyQt6-sip
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/P/PyQt6/PyQt6-6.7.0.tar.gz
        sha256: 3d31b2c59dc378ee26e16586d9469842483588142fc377280aad4a7d2fe37f75

  - name: arkmanager
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --prefix=/app .
      - install -Dm644 resources/arkmanager.desktop /app/share/applications/io.github.arkmanager.ArkManager.desktop
      - install -Dm644 resources/arkmanager.svg /app/share/icons/hicolor/scalable/apps/io.github.arkmanager.ArkManager.svg
    sources:
      - type: dir
        path: ../..
