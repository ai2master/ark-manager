# ==============================================================================
# ArkManager 持续集成工作流 | ArkManager Continuous Integration Workflow
# ==============================================================================
#
# 功能说明 | Description:
#   在每次推送到 main 分支或创建 PR 时自动运行代码质量检查和测试。
#   使用矩阵策略在 Python 3.10/3.11/3.12 三个版本上并行测试，
#   确保代码在所有支持的 Python 版本上正常工作。
#
#   Automatically runs code quality checks and tests on every push to main
#   or PR creation. Uses matrix strategy to test in parallel across
#   Python 3.10/3.11/3.12, ensuring compatibility with all supported versions.
#
# 检查项 | Checks:
#   1. ruff lint  - 代码风格和潜在错误检查 | Code style and potential bug checks
#   2. pytest     - 单元测试（33 个测试用例）| Unit tests (33 test cases)
#
# 系统依赖 | System Dependencies:
#   - p7zip-full    : 7z 命令（测试需要实际调用 7z）| 7z command for tests
#   - libgl1-mesa-dri, libegl1 : OpenGL 库（PyQt6 导入需要）| OpenGL for PyQt6
#   - libglib2.0-0  : GLib 库（Qt 底层依赖）| GLib library for Qt
#   - libxkbcommon0 : 键盘映射库（Qt 底层依赖）| Keyboard mapping for Qt
# ==============================================================================

name: CI  # 工作流名称，显示在 GitHub Actions 页面 | Workflow name shown in GitHub Actions

# ==================== 触发条件 | Trigger Conditions ====================
on:
  push:
    branches: [main]       # 推送到 main 分支时触发 | Trigger on push to main branch
  pull_request:
    branches: [main]       # 向 main 分支创建 PR 时触发 | Trigger on PR to main branch

# ==================== 任务定义 | Job Definitions ====================
jobs:
  lint-and-test:
    runs-on: ubuntu-latest  # 使用 Ubuntu 最新版运行器 | Use latest Ubuntu runner

    # 矩阵策略：在多个 Python 版本上并行运行同一任务
    # Matrix strategy: run the same job in parallel across multiple Python versions
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      # --- 检出代码 | Checkout code ---
      - uses: actions/checkout@v4

      # --- 配置 Python 环境 | Set up Python environment ---
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # --- 安装系统级依赖 | Install system-level dependencies ---
      # PyQt6 需要 OpenGL 和 X11 相关库才能正常导入
      # p7zip-full 提供 7z 命令用于集成测试
      # PyQt6 needs OpenGL and X11 libraries to import correctly
      # p7zip-full provides 7z command for integration tests
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full libgl1-mesa-dri libegl1 libglib2.0-0 libxkbcommon0

      # --- 安装 Python 依赖 | Install Python dependencies ---
      # -e ".[dev]" 以可编辑模式安装项目及开发依赖（pytest, pytest-qt, ruff）
      # -e ".[dev]" installs project in editable mode with dev deps (pytest, pytest-qt, ruff)
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # --- 代码质量检查 | Code Quality Check ---
      # ruff 是一个用 Rust 编写的极速 Python linter，检查代码风格和潜在错误
      # ruff is a blazing-fast Python linter written in Rust, checks style and bugs
      - name: Lint with ruff
        run: |
          ruff check arkmanager/

      # --- 运行测试 | Run Tests ---
      # QT_QPA_PLATFORM=offscreen 让 Qt 在无显示器的 CI 环境中运行（不需要 X11/Wayland）
      # QT_QPA_PLATFORM=offscreen allows Qt to run in headless CI (no X11/Wayland needed)
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        env:
          QT_QPA_PLATFORM: offscreen
